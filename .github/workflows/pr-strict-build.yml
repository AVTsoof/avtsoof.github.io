name: PR Strict Build

# Acceptance gate for merging into main: mirrors the local .githooks/pre-push
# strict-build gate so it cannot be bypassed with `git push --no-verify`.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-strict-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Strict build
        run: mkdocs build --strict
