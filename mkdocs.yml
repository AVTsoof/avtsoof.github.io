site_name: AVTsoof Portfolio
site_url: https://avtsoof.github.io/

theme:
  name: material

nav:
  - Home: index.md
  - Blog: blog/index.md
  - About: about.md

plugins:
  - search
  - blog:
      blog_dir: blog

markdown_extensions:
  - pymdownx.snippets:
      base_path: [docs]     # `--8<--` paths are resolved relative to docs/
      check_paths: true     # fail the build if a referenced plot is missing

exclude_docs: |
  superpowers/
  *.py
  blog/posts/_template/
